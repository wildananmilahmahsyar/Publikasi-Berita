name: CI Sequential Pipeline

on:
  push:
    branches:
      - "fitur/**"
      - develop

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build dan Test Laravel
    runs-on: ubuntu-latest

    steps:
      - name: Mengambil source code
        uses: actions/checkout@v4

      - name: Menyiapkan PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Menyiapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Menginstal dependensi PHP
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Menginstal dependensi Node.js
        run: npm ci

      - name: Menyiapkan environment Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build frontend
        run: npm run build

      - name: Menjalankan pengujian Laravel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test

  integrate-feature:
    name: Integrasi Otomatis ke Develop
    needs: build-and-test

    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/fitur/') &&
      startsWith(github.event.head_commit.message, 'release(')

    runs-on: ubuntu-latest

    concurrency:
      group: integrasi-feature-ke-develop
      cancel-in-progress: false
      queue: max

    steps:
      - name: Memvalidasi Release ID
        id: release-meta
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          set -euo pipefail

          COMMIT_SUBJECT="$(printf '%s\n' "$COMMIT_MESSAGE" | head -n 1)"
          RELEASE_PATTERN='^release\(([^)]+)\):[[:space:]]+.+$'

          echo "Pesan commit: $COMMIT_SUBJECT"

          if [[ "$COMMIT_SUBJECT" =~ $RELEASE_PATTERN ]]; then
            RELEASE_ID="${BASH_REMATCH[1]}"
          else
            echo "Format pesan commit tidak sesuai."
            echo "Gunakan format:"
            echo "release(KODE): deskripsi perubahan"
            exit 1
          fi

          echo "Release ID: $RELEASE_ID"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Membuat atau menemukan pull request
        id: pull-request
        env:
          GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.ref_name }}
          RELEASE_ID: ${{ steps.release-meta.outputs.release_id }}
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh pr list \
            --repo "$GH_REPO" \
            --head "$HEAD_BRANCH" \
            --base develop \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --repo "$GH_REPO" \
              --head "$HEAD_BRANCH" \
              --base develop \
              --title "Integrasi otomatis $RELEASE_ID: $HEAD_BRANCH ke develop" \
              --body "Pull request dibuat otomatis setelah build dan testing pada branch $HEAD_BRANCH berhasil untuk release $RELEASE_ID."

            PR_NUMBER="$(gh pr list \
              --repo "$GH_REPO" \
              --head "$HEAD_BRANCH" \
              --base develop \
              --state open \
              --json number \
              --jq '.[0].number // empty')"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "Nomor pull request tidak berhasil ditemukan."
            exit 1
          fi

          echo "Pull request yang digunakan: #$PR_NUMBER"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Menggabungkan pull request ke develop
        env:
          GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pull-request.outputs.pr_number }}
          HEAD_COMMIT: ${{ github.sha }}
        shell: bash
                run: |
          set -euo pipefail

          MAX_ATTEMPTS=5
          DELAY_SECONDS=10

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Percobaan merge fitur ke develop: $ATTEMPT/$MAX_ATTEMPTS"

            PR_STATE="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json state \
                --jq '.state'
            )"

            if [[ "$PR_STATE" == "MERGED" ]]; then
              echo "Pull request sudah berhasil digabungkan."
              exit 0
            fi

            if [[ "$PR_STATE" != "OPEN" ]]; then
              echo "::error::Pull request tidak lagi terbuka. Status: $PR_STATE"
              exit 1
            fi

            CURRENT_HEAD="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json headRefOid \
                --jq '.headRefOid'
            )"

            if [[ "$CURRENT_HEAD" != "$HEAD_COMMIT" ]]; then
              echo "::error::Commit feature branch berubah selama proses merge."
              echo "::error::Expected: $HEAD_COMMIT"
              echo "::error::Current:  $CURRENT_HEAD"
              exit 1
            fi

            if gh pr merge "$PR_NUMBER" \
              --repo "$GH_REPO" \
              --merge \
              --match-head-commit "$HEAD_COMMIT"; then
              echo "Merge fitur ke develop berhasil."
              exit 0
            fi

            PR_STATE="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json state \
                --jq '.state'
            )"

            if [[ "$PR_STATE" == "MERGED" ]]; then
              echo "Pull request telah digabungkan oleh proses lain."
              exit 0
            fi

            MERGEABLE="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json mergeable \
                --jq '.mergeable'
            )"

            MERGE_STATUS="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json mergeStateStatus \
                --jq '.mergeStateStatus'
            )"

            echo "::warning::Merge belum berhasil."
            echo "Mergeable: $MERGEABLE"
            echo "Merge status: $MERGE_STATUS"

            if [[ "$MERGEABLE" == "CONFLICTING" || "$MERGE_STATUS" == "DIRTY" ]]; then
              echo "::error::Terdapat konflik kode yang harus diselesaikan."
              exit 1
            fi

            if [[ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]]; then
              echo "::error::Merge gagal setelah $MAX_ATTEMPTS percobaan."
              exit 1
            fi

            echo "Menunggu $DELAY_SECONDS detik sebelum mencoba kembali..."
            sleep "$DELAY_SECONDS"
          done

  release-develop:
    name: Release Otomatis ke Main
    needs: build-and-test

    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/develop'

    runs-on: ubuntu-latest

    concurrency:
      group: release-develop-ke-main
      cancel-in-progress: false
      queue: max

    steps:
      - name: Mengambil repository dan riwayat branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Memeriksa kelengkapan paket tiga akun
        id: release-check
        shell: bash
        run: |
          set -euo pipefail

          git fetch --prune origin \
            "+refs/heads/*:refs/remotes/origin/*"

          BRANCHES=(
            "fitur/berita"
            "fitur/admin"
            "fitur/sekertaris"
          )

          RELEASE_ID=""
          RELEASE_PATTERN='^release\(([^)]+)\):[[:space:]]+.+$'

          for BRANCH in "${BRANCHES[@]}"; do
            BRANCH_SHA="$(git rev-parse "origin/$BRANCH")"
            COMMIT_SUBJECT="$(git log -1 --pretty=%s "$BRANCH_SHA")"

            echo "----------------------------------------"
            echo "Memeriksa branch: $BRANCH"
            echo "Commit terbaru: $BRANCH_SHA"
            echo "Pesan commit: $COMMIT_SUBJECT"

            if ! git merge-base --is-ancestor "$BRANCH_SHA" "$GITHUB_SHA"; then
              echo "$BRANCH belum terintegrasi ke develop."
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [[ "$COMMIT_SUBJECT" =~ $RELEASE_PATTERN ]]; then
              CURRENT_RELEASE_ID="${BASH_REMATCH[1]}"
            else
              echo "Commit terbaru $BRANCH belum memakai format:"
              echo "release(KODE): deskripsi perubahan"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Release ID $BRANCH: $CURRENT_RELEASE_ID"

            if [ -z "$RELEASE_ID" ]; then
              RELEASE_ID="$CURRENT_RELEASE_ID"
            elif [ "$CURRENT_RELEASE_ID" != "$RELEASE_ID" ]; then
              echo "Release ID ketiga branch belum sama."
              echo "$BRANCH menggunakan $CURRENT_RELEASE_ID."
              echo "Release yang sedang ditunggu adalah $RELEASE_ID."
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Commit develop ini sudah terdapat di main."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "----------------------------------------"
          echo "Ketiga branch sudah lengkap."
          echo "Release yang siap dipromosikan: $RELEASE_ID"
          echo "Commit develop: $GITHUB_SHA"

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "develop_commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Membuat atau menemukan pull request develop ke main
        if: steps.release-check.outputs.ready == 'true'
        id: release-pr
        env:
          GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_ID: ${{ steps.release-check.outputs.release_id }}
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="$(gh pr list \
            --repo "$GH_REPO" \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --repo "$GH_REPO" \
              --head develop \
              --base main \
              --title "Release otomatis $RELEASE_ID: develop ke main" \
              --body "Release dibuat otomatis setelah perubahan dari fitur/berita, fitur/admin, dan fitur/sekertaris telah terintegrasi serta build dan testing develop berhasil."

            PR_NUMBER="$(gh pr list \
              --repo "$GH_REPO" \
              --head develop \
              --base main \
              --state open \
              --json number \
              --jq '.[0].number // empty')"
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "Pull request develop ke main tidak ditemukan."
            exit 1
          fi

          echo "Pull request release yang digunakan: #$PR_NUMBER"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Menggabungkan develop ke main
        if: steps.release-check.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.REPO_AUTOMATION_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.release-pr.outputs.pr_number }}
          DEVELOP_COMMIT: ${{ steps.release-check.outputs.develop_commit }}
        shell: bash
                run: |
          set -euo pipefail

          MAX_ATTEMPTS=5
          DELAY_SECONDS=10

          for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Percobaan merge develop ke main: $ATTEMPT/$MAX_ATTEMPTS"

            PR_STATE="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json state \
                --jq '.state'
            )"

            if [[ "$PR_STATE" == "MERGED" ]]; then
              echo "Pull request develop ke main sudah berhasil digabungkan."
              exit 0
            fi

            if [[ "$PR_STATE" != "OPEN" ]]; then
              echo "::error::Pull request tidak lagi terbuka. Status: $PR_STATE"
              exit 1
            fi

            CURRENT_HEAD="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json headRefOid \
                --jq '.headRefOid'
            )"

            if [[ "$CURRENT_HEAD" != "$DEVELOP_COMMIT" ]]; then
              echo "::error::Branch develop berubah setelah pemeriksaan release."
              echo "::error::Expected: $DEVELOP_COMMIT"
              echo "::error::Current:  $CURRENT_HEAD"
              exit 1
            fi

            if gh pr merge "$PR_NUMBER" \
              --repo "$GH_REPO" \
              --merge \
              --match-head-commit "$DEVELOP_COMMIT"; then
              echo "Merge develop ke main berhasil."
              exit 0
            fi

            PR_STATE="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json state \
                --jq '.state'
            )"

            if [[ "$PR_STATE" == "MERGED" ]]; then
              echo "Pull request telah digabungkan oleh proses lain."
              exit 0
            fi

            MERGEABLE="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json mergeable \
                --jq '.mergeable'
            )"

            MERGE_STATUS="$(
              gh pr view "$PR_NUMBER" \
                --repo "$GH_REPO" \
                --json mergeStateStatus \
                --jq '.mergeStateStatus'
            )"

            echo "::warning::Merge belum berhasil."
            echo "Mergeable: $MERGEABLE"
            echo "Merge status: $MERGE_STATUS"

            if [[ "$MERGEABLE" == "CONFLICTING" || "$MERGE_STATUS" == "DIRTY" ]]; then
              echo "::error::Terdapat konflik kode yang harus diselesaikan."
              exit 1
            fi

            if [[ "$ATTEMPT" -eq "$MAX_ATTEMPTS" ]]; then
              echo "::error::Merge gagal setelah $MAX_ATTEMPTS percobaan."
              exit 1
            fi

            echo "Menunggu $DELAY_SECONDS detik sebelum mencoba kembali..."
            sleep "$DELAY_SECONDS"
          done