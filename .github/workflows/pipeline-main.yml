name: Main Sequential Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Mengambil source code
        uses: actions/checkout@v4

      - name: Membaca kontrol eksperimen
        shell: bash
        run: |
          FAULT_STAGE="$(tr -d '\r\n' < .experiment/fault-stage)"

          case "$FAULT_STAGE" in
            none|build|testing|deployment)
              ;;
            *)
              echo "::error::Nilai fault-stage tidak valid: $FAULT_STAGE"
              exit 1
              ;;
          esac

          echo "FAULT_STAGE=$FAULT_STAGE" >> "$GITHUB_ENV"
          echo "Fault stage: $FAULT_STAGE"

      - name: Menyiapkan Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Menginstal dependensi Node.js
        run: npm ci

      - name: Menyiapkan kegagalan build terkontrol
        if: env.FAULT_STAGE == 'build'
        shell: bash
        run: |
          printf "\nimport './__fault_missing_module__.js';\n" >> resources/js/app.js
          echo "Fault build aktif: modul JavaScript tidak tersedia."

      - name: Build frontend
        run: npm run build

  testing:
    name: Testing Laravel
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Mengambil source code
        uses: actions/checkout@v4

      - name: Membaca kontrol eksperimen
        shell: bash
        run: |
          FAULT_STAGE="$(tr -d '\r\n' < .experiment/fault-stage)"

          case "$FAULT_STAGE" in
            none|build|testing|deployment)
              ;;
            *)
              echo "::error::Nilai fault-stage tidak valid: $FAULT_STAGE"
              exit 1
              ;;
          esac

          echo "FAULT_STAGE=$FAULT_STAGE" >> "$GITHUB_ENV"
          echo "Fault stage: $FAULT_STAGE"

      - name: Menyiapkan PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, sqlite3, pdo_sqlite
          coverage: none

      - name: Menginstal dependensi PHP
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Menyiapkan environment Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Menyiapkan kegagalan testing terkontrol
        if: env.FAULT_STAGE == 'testing'
        shell: bash
        run: |
          cat > tests/Feature/InjectedFailureTest.php <<'PHP'
          <?php

          namespace Tests\Feature;

          use Tests\TestCase;

          class InjectedFailureTest extends TestCase
          {
              public function test_controlled_testing_failure(): void
              {
                  $this->assertTrue(
                      false,
                      'Kegagalan testing terkontrol untuk eksperimen.'
                  );
              }
          }
          PHP

          echo "Fault testing aktif: PHPUnit test sementara dibuat."

      - name: Menjalankan pengujian Laravel
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test